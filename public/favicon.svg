    <circle cx="0" cy="16" r="7" fill="#0f0d00"/>
    <circle cx="0" cy="16" r="3" fill="#facc15" opacity="0.15"/>
    <!-- Key shaft -->
    <rect x="-2.5" y="26" width="5" height="16" rx="2" fill="#facc15"/>
    <!-- Key teeth -->
    <rect x="2.5" y="32" width="5" height="3.5" rx="1" fill="#facc15"/>
    <rect x="2.5" y="37" width="4" height="3" rx="1" fill="#facc15"/>
